<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>URL Notes</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1>URL Notes</h1>
    <p id="url-key" class="url-key">Loading current tab…</p>
    <label class="setting-row">
      <input id="ignore-query" type="checkbox">
      <span>Ignore query strings for note keys</span>
    </label>
    <p class="setting-help">Changing this affects future note lookup for the current URL; existing notes are not migrated.</p>
    <textarea id="note" placeholder="Write a note for this URL"></textarea>
    <section class="preview" aria-labelledby="note-preview-title">
      <h2 id="note-preview-title">URL note preview</h2>
      <div id="note-preview" class="markdown-preview"></div>
    </section>
    <section class="domain-note" aria-labelledby="domain-note-title">
      <h2 id="domain-note-title">Domain note</h2>
      <p id="domain-key" class="url-key">Loading current domain…</p>
      <textarea id="domain-note" placeholder="Write a note for this domain"></textarea>
      <section class="preview" aria-labelledby="domain-preview-title">
        <h3 id="domain-preview-title">Domain note preview</h3>
        <div id="domain-preview" class="markdown-preview"></div>
      </section>
    </section>
    <p id="status" class="status" role="status">Not loaded yet.</p>
    <div class="actions">
      <button id="export-notes" type="button">Export JSON</button>
      <label class="import-label">Import JSON<input id="import-notes" type="file" accept="application/json"></label>
    </div>
    <section class="overview" aria-labelledby="notes-overview-title">
      <h2 id="notes-overview-title">Saved notes</h2>
      <input id="notes-search" type="search" placeholder="Search URL or note text" aria-label="Search saved notes">
      <p id="notes-empty" class="empty-state"></p>
      <ul id="notes-list" class="notes-list"></ul>
    </section>
  </main>
  <script type="module" src="../src/popup.js"></script>
</body>
</html>

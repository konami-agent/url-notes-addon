name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0; got: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Validate extension package
        run: npm run validate:extension

      - name: Build distributable zip
        run: npm run build:zip

      - name: Write release checksum
        run: sha256sum dist/*.zip > dist/SHA256SUMS

      - name: Write release notes
        shell: bash
        run: |
          tag="${{ steps.release_tag.outputs.tag }}"
          cat > release-notes.md <<EOF
          # URL Notes Add-on ${tag}

          Download the extension zip from the assets below and load it as an unpacked/temporary WebExtension during development or review.

          This release asset is built automatically from the tagged source by GitHub Actions after running tests, lint, extension validation, and packaging. Compare the downloaded zip with the SHA-256 checksum asset before manual review.
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.release_tag.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/*.zip dist/SHA256SUMS --clobber
          else
            gh release create "$tag" dist/*.zip dist/SHA256SUMS --title "$tag" --notes-file release-notes.md
          fi
